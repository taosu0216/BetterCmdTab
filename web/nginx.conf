server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the *.gz files precompressed at build time (see Dockerfile),
    # and gzip anything else on the fly.
    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json application/xml;

    # Hashed build assets never change — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Icons / screenshots / social image.
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # The HTML shell must never be cached, so new deploys are picked up at once.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SEO / PWA files — short cache, correct content types.
    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }

    # Single-page app: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
